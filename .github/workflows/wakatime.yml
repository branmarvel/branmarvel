# ══════════════════════════════════════════════════════════════════════════
# WakaTime Status Update
# Fetches coding activity statistics from WakaTime and injects them into
# the README.md file in the <!--START_SECTION:waka--> block.
#
# Requirements:
#   - Repository secret `PAT_TOKEN` with `repo` scope
#   - Repository secret `WAKATIME_API_KEY` from your WakaTime account
#
# References:
#   - https://github.com/anmol098/waka-readme-stats
# ══════════════════════════════════════════════════════════════════════════

name: ⏱️ Update WakaTime Stats

on:
  schedule:
    # Runs daily at 02:00 UTC (offset to avoid collision with other jobs)
    - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - ".github/workflows/wakatime.yml"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: ⏱️ Update WakaTime stats (English)
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "True"
          SHOW_TIMEZONE: "False"
          SHOW_COMMIT: "False"
          SHOW_LANGUAGE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_DAYS_OF_WEEK: "False"
          FILE: "README.md"

      - name: ⏱️ Update WakaTime stats (Spanish)
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "True"
          SHOW_TIMEZONE: "False"
          SHOW_COMMIT: "False"
          SHOW_LANGUAGE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_DAYS_OF_WEEK: "False"
          FILE: "README.es.md"
