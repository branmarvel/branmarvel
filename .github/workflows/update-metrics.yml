# ══════════════════════════════════════════════════════════════════════════
# Update Profile Metrics
# Generates an SVG with detailed GitHub metrics using lowlighter/metrics
# and commits it to the repository on a daily schedule.
#
# Requirements:
#   - Repository secret `PAT_TOKEN` with `repo` scope
#
# References:
#   - https://github.com/lowlighter/metrics
#   - https://github.com/stefanzweifel/git-auto-commit-action
# ══════════════════════════════════════════════════════════════════════════

name: 📊 Update Profile Metrics

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"

  push:
    branches:
      - main
    paths-ignore:
      - "assets/metrics.svg"
      - "assets/github-snake*.svg"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-metrics:
    name: Generate metrics SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_TOKEN }}
          filename: assets/metrics.svg
          committer_message: "chore: 🔧 auto-update profile metrics"
          committer_branch: main
          config_timezone: America/Caracas

          # ── Base configuration ──
          base: header, activity, community, repositories, metadata
          base_indepth: no

          # ── Isometric calendar ──
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Languages analysis ──
          plugin_languages: yes
          plugin_languages_indepth: no
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 10
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 90
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # ── Notable contributions ──
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit

          # ── Achievements ──
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # ── Stars ──
          plugin_stars: yes
          plugin_stars_limit: 3
